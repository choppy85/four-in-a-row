<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4 in a Row</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOBBY -->
  <div id="page-lobby">
    <h1>4 in a Row</h1>
    <div class="lobby-card">
      <input id="name-input" placeholder="Your name" maxlength="20">
      <div class="option-group">
        <label class="option-label">Who goes first?</label>
        <div class="toggle-row">
          <button class="toggle-btn active" id="first-me" onclick="selectFirst('me')">Me</button>
          <button class="toggle-btn" id="first-them" onclick="selectFirst('them')">Opponent</button>
        </div>
      </div>
      <button onclick="createRoom()">Create Game</button>
      <div class="divider">— or join existing —</div>
      <input id="room-code" placeholder="Room code" maxlength="5">
      <div class="join-row">
        <button id="join-btn" onclick="joinRoom(false)">Join as Player</button>
        <button id="watch-btn" class="secondary" onclick="joinRoom(true)">Watch</button>
      </div>
    </div>
    <p id="lobby-status"></p>
  </div>

  <!-- WAITING -->
  <div id="page-waiting">
    <h2>Waiting for opponent...</h2>
    <div class="code-box">
      <p>Share this code with your opponent</p>
      <div id="room-code-display"></div>
    </div>
  </div>

  <!-- GAME -->
  <div id="page-game">
    <div id="status-bar"></div>
    <div id="game-area">
      <div class="player-side left-side">
        <img src="player1.jpeg" alt="Player 1" class="player-photo" onerror="this.style.background='#e74c3c';this.alt=''">
        <div id="label-p0" class="player-name red-name"></div>
      </div>
      <div id="board-wrap">
        <div id="board"></div>
        <div id="rematch-area">
          <button id="rematch-btn" onclick="voteRematch()">Rematch</button>
          <p id="rematch-status"></p>
        </div>
      </div>
      <div class="player-side right-side">
        <img src="player2.jpeg" alt="Player 2" class="player-photo" onerror="this.style.background='#f1c40f';this.alt=''">
        <div id="label-p1" class="player-name yellow-name"></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
